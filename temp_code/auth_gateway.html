<body class="bg-surface text-on-surface font-body-lg" style="background-color: rgb(249, 249, 249);">
<!-- Auth Gateway Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center px-margin-edge space-y-12 max-w-[600px] mx-auto py-12 pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
<!-- Top Section: Logo and Identity -->
<div class="flex flex-col items-center w-full">
<img alt="Linker Logo" class="w-[120px] h-auto mx-auto shadow-md" src="https://lh3.googleusercontent.com/aida/ADBb0ui4MmNzW_VkLsmE0ZB3d4mXPCJu7lOhXJT_HSQbuSHg6PpB6Hecno5ni8xYV-kbr0xEc9DNV4fqwl9l5ne4xCXcvBqhjuL2kY1808KVKZjISlpUUl6cJXGrE82yI7FdEHklbHy0Sy2JF9AmvAxGH8POemaUjnAmSD3PcYa_GlDt4uamodwz7ZBR3fprYUAnsdbiYg7Tkx5cy9tCcxUIVzZJQrVqD6HtuEvqBaIj2AhrhkVaa_z0UsmMMpL5SLD77TQaPqvackZo">
</div>
<!-- Middle Section: Input Form -->
<div class="w-full space-y-12">
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your phone number to continue</p>
</div>
<!-- Phone Number Input -->
<div class="relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block ml-1">Phone Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">call</span>
<input class="w-full h-input-min-height pl-12 pr-4 bg-transparent border border-outline-variant rounded-xl font-body-lg text-body-lg focus:ring-2 focus:ring-primary transition-all placeholder:text-outline-variant" placeholder="+1 (555) 000-0000" type="tel">
</div>
</div>
</div>
<!-- Bottom Section: Actions -->
<div class="w-full space-y-4">
<button class="w-full bg-primary hover:bg-primary-container active:scale-[0.98] transition-all py-4 rounded-xl shadow-lg shadow-primary/20">
<span class="font-headline-md text-headline-md text-on-primary">Continue</span>
</button>
<div class="text-center">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors" href="#">
                New to Linker? <span class="underline decoration-outline-variant/30 font-medium">Create an account</span>
</a>
</div>
</div>
</main>
